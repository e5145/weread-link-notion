name: Sync WeRead Link Notion

on:
  workflow_dispatch:
    inputs:
      reset_page:
        description: "Archive all existing blocks in NOTION_PAGE before rebuilding the dashboard."
        required: false
        default: false
        type: boolean
  schedule:
    # Runs every day at 00:30 Asia/Shanghai.
    - cron: "30 16 * * *"

permissions:
  contents: write

concurrency:
  group: weread-link-notion
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE: ${{ secrets.NOTION_PAGE }}
      DASHBOARD_QUOTE: ${{ vars.DASHBOARD_QUOTE || '看书真好' }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install font for profile image
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Check connection
        run: python -m weread_link_notion check

      - name: Generate heatmap
        run: python -m weread_link_notion heatmap

      - name: Generate monthly reading chart
        run: python -m weread_link_notion monthly-chart

      - name: Generate reading profile
        run: python -m weread_link_notion profile

      - name: Publish visual assets
        shell: bash
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/heatmap.png assets/heatmap.svg assets/heatmap.json assets/monthly-reading.png assets/monthly-reading.json assets/reading-profile.png assets/reading-profile.json
          if git diff --cached --quiet; then
            echo "No visual asset changes to commit."
          else
            git commit -m "update weread visual assets"
            git push
          fi

      - name: Reset Notion page
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_page == true }}
        run: python -m weread_link_notion reset-page

      - name: Sync Notion
        run: python -m weread_link_notion sync
