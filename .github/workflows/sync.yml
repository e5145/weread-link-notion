name: Sync WeRead Link Notion

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 00:30 Asia/Shanghai.
    - cron: "30 16 * * *"

permissions:
  contents: write

concurrency:
  group: weread-link-notion
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE: ${{ secrets.NOTION_PAGE }}
      SYNC_NOTES: ${{ vars.SYNC_NOTES || 'true' }}
      MAX_NOTEBOOKS: ${{ vars.MAX_NOTEBOOKS || '0' }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Check connection
        run: python -m weread_link_notion check

      - name: Generate heatmap
        run: python -m weread_link_notion heatmap

      - name: Publish heatmap assets
        shell: bash
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/heatmap.png assets/heatmap.svg assets/heatmap.json
          if git diff --cached --quiet; then
            echo "No heatmap changes to commit."
          else
            git commit -m "update weread heatmap"
            git push
          fi

      - name: Sync Notion
        run: python -m weread_link_notion sync
